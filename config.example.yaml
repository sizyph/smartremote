# Copy to config.yaml (next to inbox/ and jobs/) and edit. The dispatcher reads
# <root>/config.yaml; if absent, these defaults apply.

poll_interval_seconds: 2
max_parallel_cpu_jobs: 3      # gpu:none jobs run in parallel up to this;
                              # gpu:required jobs ALWAYS serialize behind gpu.lock.

hermes:
  enabled: false              # false -> ConsoleNotifier (prints; great for dev/test)
  base_url: "http://127.0.0.1:8080"   # your Hermes Agent messaging gateway
  token: ""                   # bearer token, if your gateway requires one

# How finished jobs' artifacts are published (links land in the completion message).
publish:
  backend: local              # local (pull) | git | rclone | auto (small->git, big->rclone)
  size_threshold_mb: 25
  git:                        # a PRIVATE results repo — NOT this public tool repo
    repo_dir: ""              # local clone path, e.g. ~/smartremote-results
    remote: ""                # e.g. git@github.com:sizyph/smartremote-results.git
    branch: main
    push: true
  rclone:
    remote: ""                # e.g. gdrive:smartremote-results  (an rclone remote name)
    link: true
